      <stop offset="0%" style="stop-color:#FF6B2B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Anvil shape - the forge -->
  <path d="M128 320 L96 400 L416 400 L384 320 Z" fill="#1a1a1a"/>
  <path d="M112 320 L400 320 L400 340 L112 340 Z" fill="#2a2a2a"/>
